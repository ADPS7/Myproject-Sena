<div class="container mt-4">
    <h2 class="fw-bold text-dark mb-1" id="historial-view-title">Historial de Notas</h2>
    <p class="text-muted mb-2" id="historial-view-subtitle">Resumen de calificaciones del módulo seleccionado.</p>

    <div class="row mb-3 gx-2 gy-2 align-items-center">
        <div class="col-12 col-md-6 text-start">
            <button id="historial-back-btn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Volver a Notas</button>
        </div>
        <div class="col-12 col-md-6 text-md-end mt-2 mt-md-0">
            <button id="exportPdfBtn" class="btn btn-outline-danger btn-sm me-2" type="button" disabled>Exportar PDF</button>
            <button id="exportExcelBtn" class="btn btn-outline-success btn-sm" type="button" disabled>Exportar Excel</button>
        </div>
    </div>

    <div class="row mb-3 gx-2 gy-2">
        <div class="col-12 col-md-6">
            <label for="historialEstadoFilter" class="form-label fw-bold">Filtrar estado:</label>
            <select id="historialEstadoFilter" class="form-select">
                <option value="all">Todos</option>
                <option value="aprobados">Aprobados</option>
                <option value="no_aprobados">No aprobados</option>
            </select>
        </div>
    </div>

    <div id="historialNotasContainer">
        <!-- Aquí se renderizará el historial de notas -->
    </div>
</div>


<!-- Librerías para exportación -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    // Esperar a que las librerías carguen
    window.addEventListener('load', () => {
        console.log('jsPDF cargado:', !!window.jspdf);
        console.log('autoTable disponible:', typeof window.jspdf?.jsPDF?.prototype?.autoTable);
    });
</script>
