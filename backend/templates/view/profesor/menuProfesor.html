<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/inicioprofesor.css') }}">
</head>
<body>

    <!-- Navbar Móvil -->
    <nav class="navbar navbar-dark bg-primary d-md-none fixed-top shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">Edullinas</span>
            <button class="navbar-toggler border-0" type="button" 
                    data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                <i class="bi bi-list fs-2"></i>
            </button>
        </div>
    </nav>

    <!-- OFFCANVAS MENÚ MÓVIL -->
    <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="mobileMenu" style="width: 280px;">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold text-primary">Edullinas</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="nav flex-column">
                <a onclick="mostrarvistaInicioProfesor()" class="nav-link-item" data-bs-dismiss="offcanvas">
                    <i class="bi bi-house"></i> Inicio
                </a>
                <a onclick="mostrarvistaCursosProfesor()" class="nav-link-item" data-bs-dismiss="offcanvas">
                    <i class="bi bi-journal-bookmark"></i> Mis Cursos
                </a>
                <a href="#" class="nav-link-item" data-bs-dismiss="offcanvas">
                    <i class="bi bi-stack"></i> Calificar
                </a>
                <a href="#" class="nav-link-item" data-bs-dismiss="offcanvas">
                    <i class="bi bi-people"></i> Asistencia
                </a>
                <a href="#" class="nav-link-item" data-bs-dismiss="offcanvas">
                    <i class="bi bi-clipboard-check"></i> Notas
                </a>
                <hr>
                <a href="/logout" class="btn btn-sm btn-outline-danger w-100">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            
            <!-- SIDEBAR ESCRITORIO -->
            <nav class="col-md-3 col-lg-2 sidebar d-none d-md-flex flex-column">
                <div class="sidebar-header text-center mb-4">
                    <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" class="img-fluid logo-img">
                </div>
                
                <div class="nav flex-column flex-grow-1 px-2">
                    <a onclick="mostrarvistaInicioProfesor()" class="nav-link-item"><i class="bi bi-house"></i> Inicio</a>
                    <a onclick="mostrarvistaCursosProfesor()" class="nav-link-item"><i class="bi bi-journal-bookmark"></i> Mis Cursos</a>
                    <a href="#" class="nav-link-item"><i class="bi bi-stack"></i> Calificar</a>
                    <a href="#" class="nav-link-item"><i class="bi bi-people"></i> Asistencia</a>
                    <a href="#" class="nav-link-item"><i class="bi bi-clipboard-check"></i> Notas</a>
                </div>

                <div class="sidebar-footer mt-auto pt-3">
                    <div class="user-pill mb-3">
                        <div class="avatar">{{ user.nombres[0] }}</div>
                        <div class="overflow-hidden">
                            <p class="mb-0 fw-bold small text-truncate">{{ user.nombres }}</p>
                            <span class="text-muted small">{{ user.rol }}</span>
                        </div>
                    </div>
                    <a href="/logout" class="btn btn-sm btn-outline-danger w-100">Cerrar Sesión</a>
                </div>
            </nav>

            <!-- CONTENIDO PRINCIPAL -->
            <main class="col-12 col-md-9 col-lg-10 main-content p-4">
                <div id="mostrarInicioProfesor">
                    {% include "view/profesor/inicioProfesor.html" %}
                </div>
                <div id="mostrarCursosProfesor" style="display:none;">
                    {% include "view/profesor/cursosProfesor.html" %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='backend/javascripts/menuProfesor.js') }}"></script>
    <script src="{{ url_for('static', filename='backend/javascripts/cursosProfesor.js') }}"></script>
    <script>
    window.USER_ID = Number('{{ user.id_usuario }}');
</script>
</body>
</html>
