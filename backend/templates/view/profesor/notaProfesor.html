<div class="container mt-4">
    <h2 class="fw-bold text-dark mb-1" id="view-title">Notas</h2>
    <p class="text-muted mb-2" id="view-subtitle">Aquí puedes ver y actualizar las calificaciones de tus estudiantes.</p>

    <!-- Barra de información -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body py-2">
                    <div class="d-flex flex-column flex-md-row gap-3 align-items-start align-items-md-center">
                        <div>
                            <strong>Curso:</strong> <span id="selectedCourseName">—</span>
                        </div>
                        <div>
                            <strong>Módulo:</strong> <span id="selectedModuleName">—</span>
                        </div>
                        <div class="ms-md-auto text-end">
                            <div class="d-flex gap-2 justify-content-end align-items-center">
                                <small class="text-muted">Selecciona curso y módulo para listar estudiantes</small>
                                <button id="applyAllNotaBtn" class="btn btn-outline-success btn-sm ms-2" type="button" disabled>Aplicar notas</button>
                                <button id="viewAllNotasBtn" class="btn btn-outline-primary btn-sm ms-2" disabled>Ver notas del módulo</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Nota: modales removidos — la vista completa reemplaza al modal -->

    <!-- Selección de curso y módulo -->
    <div class="row mb-3 gx-2 gy-2">
        <div class="col-12 col-md-6">
            <label for="cursoSelect" class="form-label fw-bold">Curso:</label>
            <select id="cursoSelect" class="form-select">
                <option value="">-- Selecciona un curso --</option>
            </select>
        </div>
        <div class="col-12 col-md-6">
            <label for="moduloSelect" class="form-label fw-bold">Módulbo:</label>
            <select id="moduloSelect" class="form-select">
                <option value="">-- Selecciona un módulo --</option>
            </select>
        </div>
    </div>

    <div class="row mb-3 gx-2 gy-2">
        <div class="col-12 col-md-6">
            <label for="searchStudentInput" class="form-label fw-bold">Buscar estudiante:</label>
            <input id="searchStudentInput" type="text" class="form-control" placeholder="Buscar por nombre o correo" disabled>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-12">
            <label class="form-label fw-bold">Nombre de la Actividad / Evaluación:</label>
            <input type="text" id="nombreActividad" class="form-control" 
                placeholder="Ej: Examen Parcial 1, Taller 2, Proyecto Final..." value="Evaluación">
        </div>
    </div>

    <!-- Lista de estudiantes -->
    <div class="card shadow-sm notas-prof-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead class="table-primary">
                        <tr>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Nota</th>
                            <th class="text-nowrap">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEstudiantes">
                        <!-- Filas se inyectan desde JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="notaFeedback" class="mt-3"></div>
</div>
