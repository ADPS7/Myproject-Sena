<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profesor - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #f8fafc; --accent: #4f46e5; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .sidebar { background: white; height: 100vh; border-right: 1px solid #e2e8f0; padding: 2rem; position: fixed; }
        .main { margin-left: 16.6%; padding: 3rem; }
        .card-prof { background: white; border-radius: 20px; padding: 1.5rem; border-left: 5px solid var(--accent); shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-action { border-radius: 12px; font-weight: 600; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" width="140" class="mb-4">
                <div class="nav flex-column">
                    <a href="#" class="nav-link active" style="color: var(--accent)"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-people"></i> Mis Grupos</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-pencil-square"></i> Calificar</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-file-earmark-arrow-up"></i> Materiales</a>
                    <hr>
                    <a href="/logout" class="nav-link text-danger"><i class="bi bi-box-arrow-right"></i> Salir</a>
                </div>
            </nav>
            <main class="col-md-10 main">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h2 class="fw-bold">Gestión Académica</h2>
                        <p class="text-muted">Bienvenido, Prof. {{ user.apellidos }}</p>
                    </div>
                    <button class="btn btn-primary btn-action"><i class="bi bi-plus-lg"></i> Nuevo Aviso</button>
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card-prof">
                            <h4><i class="bi bi-people me-2"></i> Grupos Activos</h4>
                            <p class="text-muted">Tienes 4 grupos asignados esta semana.</p>
                            <div class="list-group list-group-flush mt-3">
                                <div class="list-group-item d-flex justify-content-between">Programación Web <span>32 alumnos</span></div>
                                <div class="list-group-item d-flex justify-content-between">Bases de Datos <span>28 alumnos</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card-prof" style="border-left-color: #ef4444;">
                            <h4><i class="bi bi-clock-history me-2"></i> Pendientes</h4>
                            <p class="text-muted">Tareas por revisar de la semana pasada.</p>
                            <div class="alert alert-danger mt-3 py-2">
                                <i class="bi bi-info-circle me-2"></i> 15 exámenes sin calificar
                            </div>
                            <button class="btn btn-outline-danger btn-sm w-100">Ir a calificar ahora</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
