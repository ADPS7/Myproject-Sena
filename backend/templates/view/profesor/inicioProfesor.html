<!-- view/profesor/inicioProfesorContent.html -->

<div class="mb-5">
    <h1 class="fw-bold h3 mb-2" style="color: #1e293b;">
        ¡Bienvenido de nuevo, Profesor! 👋
    </h1>
    <p class="text-muted mb-0" style="font-size: 1.05rem;">
        Gestiona tus cursos, califica a tus estudiantes y lleva el control de la asistencia.
    </p>
</div>

<h2 class="menu-label mb-3">Resumen Académico</h2>

<div class="row g-3">
    
    <!-- Cursos -->
    <div class="col-6 col-xl-3">
        <a onclick="mostrarvistaCursosProfesor()" class="text-decoration-none text-dark" style="cursor: pointer;">
            <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                <div class="d-flex align-items-center gap-3">
                    <div class="p-3 rounded-3" style="background-color: #f0fdf4;">
                        <i class="bi bi-journal-text fs-4" style="color: #16a34a;"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Mis Cursos</h5>
                        <small class="text-muted">Ver asignaturas</small>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Asistencias -->
    <div class="col-6 col-xl-3">
        <a onclick="mostrarvistaAsistenciaProfesor()" class="text-decoration-none text-dark" style="cursor: pointer;">
            <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                <div class="d-flex align-items-center gap-3">
                    <div class="p-3 rounded-3" style="background-color: #e0f2fe;">
                        <i class="bi bi-calendar-check fs-4" style="color: #0284c7;"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Asistencias</h5>
                        <small class="text-muted">Control de ingresos</small>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <!-- Notas / Calificaciones -->
    <div class="col-6 col-xl-3">
        <a onclick="mostrarvistaNotasProfesor()" class="text-decoration-none text-dark" style="cursor: pointer;">
            <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                <div class="d-flex align-items-center gap-3">
                    <div class="p-3 rounded-3" style="background-color: #faf5ff;">
                        <i class="bi bi-file-earmark-spreadsheet fs-4" style="color: #9333ea;"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Notas</h5>
                        <small class="text-muted">Calificar alumnos</small>
                    </div>
                </div>
            </div>
        </a>
    </div>



</div>
