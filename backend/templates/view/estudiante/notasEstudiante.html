<link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/notasEstudiante.css') }}">

<div class="row mb-4">

            <h1 class="h3 fw-bold mb-1">Mis notas</h1>
            <p class="text-muted mb-0">Aquí podrás revisar tus calificaciones por módulo.</p>
        </div>
        <div class="text-md-end">
            <span class="badge bg-primary bg-opacity-10 text-primary py-2 px-3 rounded-pill">Curso: <strong id="estudianteNotasCurso">Cargando...</strong></span>
        </div>
    </div>
</div>

<div class="row" id="contenedorNotasEstudiante">
    <div class="col-12">
        <div class="card border-0 shadow-sm p-4">
            <div class="text-center py-5 text-secondary">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-3 mb-0">Cargando tus notas...</p>
            </div>
        </div>
    </div>
</div>
