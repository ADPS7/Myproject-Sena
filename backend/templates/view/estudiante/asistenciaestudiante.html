<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencias - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='backend/css/estilosAsistencia.css') }}">
</head>
<body class="bg-light">

<div class="container-fluid asistencia-container py-4">

    <div class="attendance-header text-center bg-white p-4 p-md-5 rounded-4 shadow-sm border mb-4">
        <span class="attendance-label badge bg-light text-secondary border px-3 py-2 rounded-pill fw-bold fs-7 mb-3 text-uppercase tracking-wider">
            REGISTRO DIARIO
        </span>
        <h1 class="attendance-title fw-bold text-dark mb-2" style="letter-spacing: -0.5px;">
            Mis Asistencias
        </h1>
        <p class="attendance-subtitle text-muted fs-6 mb-0">
            Control de asistencias por módulo
        </p>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white overflow-hidden d-none" id="seccionTablaModulo">
        <div class="card-header bg-white py-3 border-bottom">
            <h5 class="fw-bold mb-0 text-dark" id="tituloModulo">Asistencias - Seleccione un módulo</h5>
        </div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Observación</th>
                    </tr>
                </thead>
                <tbody id="tablaAsistencia">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="accordion" id="accordionAsistencia">
        <div class="text-center py-5" id="asistenciaCargandoPlaceholder">
            <div class="spinner-border text-secondary" role="status" style="width: 2.5rem; height: 2.5rem;">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.USER_ID = "{{ session.get('id_usuario', '') }}"; 
</script>
<script src="{{ url_for('static', filename='backend/javascripts/datosPersonales.js') }}"></script>
</body>
</html>
