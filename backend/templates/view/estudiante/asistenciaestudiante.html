<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencias - Edullinas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/asistenciaEstudiante.css') }}">
</head>
<body class="bg-light">

<div class="container-fluid asistencia-container py-5">

    <section class="attendance-header bg-white p-4 p-md-5 rounded-4 shadow-sm border mb-4">
        <h4 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">Control de Asistencias</h4>
        <p class="text-secondary small mb-0">Revisa detalladamente tu historial de clases, porcentajes de asistencia y registros por cada módulo académico.</p>
    </section>

    <div id="resumenAsistenciaEstudiante" class="row g-3 mb-4"></div>

    <div class="card border-0 shadow-sm rounded-4 mb-4 bg-white overflow-hidden d-none" id="seccionTablaModulo">
        <div class="card-header bg-white py-3 border-bottom">
            <h5 class="fw-bold mb-0 text-dark" id="tituloModulo">Asistencias por Módulo</h5>
        </div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Fecha</th>
                        <th>Estado</th>
                        <th class="pe-4">Observación</th>
                    </tr>
                </thead>
                <tbody id="tablaAsistencia">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="accordion" id="accordionAsistencia">
        <div class="text-center py-5" id="asistenciaCargandoPlaceholder">
            <div class="spinner-border text-muted" role="status" style="width: 2rem; height: 2rem; border-width: 0.22em;">
                <span class="visually-hidden">Cargando módulos...</span>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.USER_ID = "{{ session.get('id_usuario', '') }}"; 
</script>
    <script src="{{ url_for('static', filename='backend/javascripts/asistenciaEstudiante.js') }}"></script>

</body>
</html>
