<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudiante - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #f8fafc; --accent: #2563eb; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .sidebar { background: white; height: 100vh; border-right: 1px solid #e2e8f0; padding: 2rem; position: fixed; }
        .main { margin-left: 16.6%; padding: 3rem; }
        .card-stat { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid #e2e8f0; }
        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" width="140" class="mb-4">
                <div class="nav flex-column">
                    <a href="#" class="nav-link active text-primary"><i class="bi bi-grid"></i> Inicio</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-book"></i> Mis Módulos</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-star"></i> Notas</a>
                    <a href="#" class="nav-link text-secondary"><i class="bi bi-calendar"></i> Horario</a>
                    <hr>
                    <a href="/logout" class="nav-link text-danger"><i class="bi bi-box-arrow-right"></i> Salir</a>
                </div>
            </nav>
            <main class="col-md-10 main">
                <div class="d-flex justify-content-between mb-5">
                    <h2>Panel del <b>Estudiante</b></h2>
                    <span class="badge bg-primary-subtle text-primary p-2 px-3 rounded-pill">{{ user.nombres }}</span>
                </div>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card-stat">
                            <div class="icon-box bg-primary text-white"><i class="bi bi-journal-text"></i></div>
                            <h5>Módulos Inscritos</h5>
                            <h2 class="fw-bold">4</h2>
                            <p class="text-muted small">2 pendientes de finalizar</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-stat">
                            <div class="icon-box bg-success text-white"><i class="bi bi-check2-circle"></i></div>
                            <h5>Promedio Actual</h5>
                            <h2 class="fw-bold">4.8</h2>
                            <p class="text-muted small">¡Vas por muy buen camino!</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-stat">
                            <div class="icon-box bg-warning text-dark"><i class="bi bi-clock"></i></div>
                            <h5>Asistencia</h5>
                            <h2 class="fw-bold">95%</h2>
                            <p class="text-muted small">Solo 1 inasistencia registrada</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
