<!-- view/estudiante/inicioEstudianteContent.html -->

<header class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold h4">Panel del Estudiante</h2>
        <p class="text-muted small mb-0" id="inicioCursoActual">Curso: Cargando...</p>
    </div>
    <span class="badge rounded-pill bg-primary-soft text-primary px-3 py-2">Estudiante</span>
</header>

<!-- Tarjetas de Resumen -->
<div class="row g-3 mb-5">
    <div class="col-6 col-lg-4">
        <div class="card-stat">
            <div class="icon-box bg-primary text-white">
                <i class="bi bi-journal-text"></i>
            </div>
            <h5 class="fw-semibold">Módulos Inscritos</h5>
            <h2 class="fw-bold mb-1" id="inicioModulosInscritos">0</h2>
            <p class="text-muted small" id="inicioModulosPendientes">Cargando...</p>
        </div>
    </div>
    <div class="col-6 col-lg-4">
        <div class="card-stat">
            <div class="icon-box bg-success text-white">
                <i class="bi bi-check2-circle"></i>
            </div>
            <h5 class="fw-semibold">Promedio Actual</h5>
            <h2 class="fw-bold mb-1" id="inicioPromedioActual">0.00</h2>
            <p class="text-muted small" id="inicioPromedioTexto">Cargando tus notas...</p>
        </div>
    </div>
    <div class="col-6 col-lg-4">
        <div class="card-stat">
            <div class="icon-box bg-warning text-dark">
                <i class="bi bi-clock"></i>
            </div>
            <h5 class="fw-semibold">Asistencia</h5>
            <h2 class="fw-bold mb-1" id="inicioAsistencia">0%</h2>
            <p class="text-muted small" id="inicioAsistenciaTexto">Cargando tus asistencias...</p>
        </div>
    </div>
</div>
