<!-- view/estudiante/perfilEstudiante.html -->
<div class="container-fluid p-4">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-success text-white py-3 rounded-top-4">
            <h5 class="card-title mb-0 fw-bold">
                <i class="bi bi-person-workspace me-2"></i> Mi Perfil Estudiantil Completo
            </h5>
        </div>

        <div class="card-body p-4">
            <div class="row">
                <div class="col-lg-3 text-center border-end">
                    <div class="avatar mx-auto mb-3" style="width: 100px; height: 100px; font-size: 2.5rem; background-color: #198754; color: white; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
                        {{ user.nombres[0] }}
                    </div>
                    <h5 class="fw-bold mb-0" id="nombreCompletoEstudianteVista"></h5>
                    <p class="text-muted mb-2" id="rolEstudianteVista"></p>
                    <span id="estadoEstudianteVista" class="badge rounded-pill bg-secondary px-3 py-2 fs-6">
                        Estado: Pendiente
                    </span>
                </div>

                <div class="col-lg-9">
                    <form id="formPerfilEstudiante">
                        <input type="hidden" id="id_usuario_est" value="{{ user.id_usuario }}" readonly>
                        <input type="hidden" id="id_datos_usuario_est" readonly>

                        <h6 class="text-success fw-bold mb-3"><i class="bi bi-card-text me-2"></i> Datos de Cuenta</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Nombres</label>
                                <input type="text" class="form-control rounded-3" id="nombres_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Apellidos</label>
                                <input type="text" class="form-control rounded-3" id="apellidos_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Correo Electrónico</label>
                                <input type="email" class="form-control rounded-3" id="correo_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Fecha de Nacimiento</label>
                                <input type="date" class="form-control rounded-3" id="fecha_nacimiento_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Cargo / Rol</label>
                                <input type="text" class="form-control rounded-3 bg-light" id="rol_est" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Sexo</label>
                                <select class="form-select rounded-3" id="sexo_est" required>
                                    <option value="" disabled>Seleccione...</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                    <option value="O">Otro</option>
                                </select>
                            </div>
                        </div>

                        <hr class="text-muted my-4">
                        <h6 class="text-success fw-bold mb-3"><i class="bi bi-shield-lock me-2"></i> Documento de Identidad</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Tipo de Documento</label>
                                <select class="form-select rounded-3" id="tipo_documento_est" required>
                                    <option value="" disabled>Seleccione...</option>
                                    <option value="DNI">DNI</option>
                                    <option value="Cedula">Cédula de Ciudadanía</option>
                                    <option value="Cedula de Extranjería">Cédula de Extranjería</option>
                                    <option value="Pasaporte">Pasaporte</option>
                                    <option value="Tarjeta de Identidad">Tarjeta de Identidad</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Número de Documento</label>
                                <input type="text" class="form-control rounded-3" id="numero_documento_est" required>
                            </div>
                        </div>

                        <hr class="text-muted my-4">
                        <h6 class="text-success fw-bold mb-3"><i class="bi bi-geo-alt me-2"></i> Ubicación y Contacto</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-secondary">Departamento</label>
                                <input type="text" class="form-control rounded-3" id="departamento_est" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-secondary">Municipio / Ciudad</label>
                                <input type="text" class="form-control rounded-3" id="municipio_est" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-secondary">Dirección de Residencia</label>
                                <input type="text" class="form-control rounded-3" id="direccion_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Teléfono Personal</label>
                                <input type="tel" class="form-control rounded-3" id="telefono_est" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Teléfono de Emergencia</label>
                                <input type="tel" class="form-control rounded-3" id="telefono_emergencia_est" required>
                            </div>
                        </div>

                        <hr class="text-muted my-4">
                        <h6 class="text-success fw-bold mb-3"><i class="bi bi-heart-pulse me-2"></i> Otros Datos Importantes</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Estrato Socioeconómico</label>
                                <select class="form-select rounded-3" id="estrato_est" required>
                                    <option value="" disabled>Seleccione...</option>
                                    <option value="1">Estrato 1</option>
                                    <option value="2">Estrato 2</option>
                                    <option value="3">Estrato 3</option>
                                    <option value="4">Estrato 4</option>
                                    <option value="5">Estrato 5</option>
                                    <option value="6">Estrato 6</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Entidad de Salud (EPS)</label>
                                <input type="text" class="form-control rounded-3" id="eps_est" required>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-secondary">Actualizar Contraseña</label>
                                <input type="password" class="form-control rounded-3" id="nueva_clave_est" placeholder="Dejar en blanco para mantener la actual">
                            </div>
                            <div class="col-md-6">
                                <button type="button" class="btn btn-success rounded-3 px-5 w-100 py-2 fw-bold" onclick="guardarPerfilEstudiante()">
                                    <i class="bi bi-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
    <div id="toastNotificacion" class="toast align-items-center text-white bg-success border-0 rounded-3 shadow" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                <strong id="toastTitulo" class="d-block"></strong>
                <span id="toastMensaje"></span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>
