<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Edullinas</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-light: #f1f5f9;
            --card-white: #ffffff;
            --accent-blue: #2563eb;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.03) 0px, transparent 50%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        .container-box {
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo img {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        .login-card {
            background: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-weight: 700;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group-custom {
            margin-bottom: 1.5rem;
        }

        .input-group-custom label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-dark);
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-control {
            border: 1.5px solid var(--border-color);
            padding: 12px 12px 12px 48px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .btn-submit {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: 700;
            margin-top: 1rem;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container-box">
        <div class="brand-logo">
            <!-- Usamos la misma ruta de imagen que en el registro -->
            <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" alt="Edullinas Logo">
        </div>

        <div class="login-card">
            <h2>Bienvenido</h2>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>

            <!-- Asegúrate de tener una ruta /login en Flask que maneje el POST -->
            <form action="/login" method="POST">
                
                <div class="input-group-custom">
                    <label>Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" name="email" class="form-control" placeholder="usuario@correo.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Contraseña</label>
                    <div class="input-field">
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock"></i>
                    </div>
                    <div class="text-end mt-1">
                        <a href="#" class="text-decoration-none" style="font-size: 0.8rem; color: var(--accent-blue);">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Iniciar Sesión
                </button>
            </form>

            <div class="footer-link">
                ¿No tienes una cuenta? <a href="/registrarse">Regístrate aquí</a>
            </div>
        </div>
    </div>

</body>
</html>
