<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/login.css') }}">
</head>
<body>

    <div class="container-box">
        <div class="brand-logo">
            <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" alt="Edullinas Logo">
        </div>

        <div class="login-card">
            <h2>Bienvenido</h2>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>

            <form action="/login" method="POST">
                
                <div class="input-group-custom">
                    <label>Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" name="email" class="form-control" placeholder="usuario@correo.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Contraseña</label>
                    <div class="input-field">
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock"></i>
                    </div>
                    <div class="text-end mt-1">
                        <a href="#" class="text-decoration-none" style="font-size: 0.8rem; color: var(--accent-blue);">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Iniciar Sesión
                </button>
            </form>

            <div class="footer-link">
                ¿No tienes una cuenta? <a href="/registrarse">Regístrate aquí</a>
            </div>
        </div>
    </div>

</body>
</html>
