<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/login.css') }}">
</head>
<body>

    <div class="container-box">
        <div class="brand-logo">
            <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" alt="Edullinas Logo">
        </div>

        <div class="login-card">
            <h2>¿Olvidaste tu contraseña?</h2>
            <p class="subtitle">Introduce tu correo electrónico y te enviaremos las instrucciones para restablecerla.</p>

            <form id="recoverForm">
                <div class="input-group-custom">
                    <label>Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" name="email" id="email" class="form-control" placeholder="usuario@correo.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    Enviar Instrucciones
                </button>
            </form>

            <div class="footer-link">
                ¿Recordaste tu contraseña? <a href="{{ url_for('render_static_page', page_name='login') }}">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='backend/javascripts/olvidasteClave.js') }}"></script>
</body>
</html>
