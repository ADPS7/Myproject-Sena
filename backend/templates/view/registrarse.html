<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='frontend/style/registrarse.css') }}">
</head>
<body>

    <div class="container-box">
        <div class="brand-logo">
            <img src="{{ url_for('static', filename='frontend/images/instituto-removebg-preview.png') }}" alt="Edullinas Logo">
        </div>

        <div class="register-card">
            <h2>Crea tu cuenta</h2>
            <p class="subtitle">Ingresa tus datos para registrarte</p>

            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label>Nombre</label>
                            <div class="input-field">
                                <input type="text" name="nombre" class="form-control" placeholder="Juan" required>
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-custom">
                            <label>Apellido</label>
                            <div class="input-field">
                                <input type="text" name="apellido" class="form-control" placeholder="Pérez" required>
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" name="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Fecha de Nacimiento</label>
                    <div class="input-field">
                        <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" class="form-control" required>
                        <i class="bi bi-calendar-event"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Contraseña</label>
                    <div class="input-field">
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock"></i>
                    </div>
                    <small class="text-muted" style="font-size: 0.75rem; color: #7C4DFF !important;">
                        Mínimo 7 caracteres, 1 mayúscula, 1 minúscula, 1 número y 1 símbolo.
                    </small>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    Completar Registro
                </button>
            </form>

            <div class="footer-link">
                ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='backend/javascripts/registrarse.js') }}"></script>
</body>
</html>
