<!-- Estilos del panel -->
<link rel="stylesheet" href="{{url_for('static', filename='frontend/style/asistenciaAdmin.css')}}">
<!-- Contenedor Principal -->
<div class="container-fluid py-4">
    <!-- Encabezado Dinámico -->
    <div class="row align-items-center mb-4">
        <div class="col-12 col-md-7">
            <h2 class="fw-bold text-dark mb-1" id="view-title">Control de Asistencias</h2>
            <p class="text-muted mb-0" id="view-subtitle">Cargando información del servidor...</p>
        </div>
        <div class="col-12 col-md-5 text-md-end mt-3 mt-md-0" id="back-button-container">
            <!-- Botón de navegación dinámico -->
        </div>
    </div>

    <!-- Área de Contenido Variable -->
    <div class="row g-4" id="contenedor-principal">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Sincronizando base de datos...</p>
        </div>
    </div>
</div>
