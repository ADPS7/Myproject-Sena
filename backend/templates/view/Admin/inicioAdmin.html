<!-- Contenedor de Bienvenida -->
<div class="mb-5">
    <div class="row align-items-center g-4">
        <div class="col-12 col-md-7">
            <h1 class="fw-bold h3 mb-2" style="color: #1e293b;">¡Bienvenido de nuevo! 👋</h1>
            <p class="text-muted mb-0" style="font-size: 1rem;">
                Administra los usuarios, supervisa el rendimiento de los estudiantes 
                y gestiona cursos y modulos desde tu panel de control. Mantente al tanto de la actividad reciente
            </p>
        </div>
        
        <div class="col-12 col-md-5 d-flex justify-content-md-end">
            <div class="user-pill shadow-sm bg-white">
                <div class="avatar">A</div>
                <div>
                    <div class="fw-bold" style="font-size: 0.85rem; line-height: 1;">Admin Principal</div>
                    <small class="text-success" style="font-size: 0.75rem;">Sesión activa</small>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="mb-4">
    <h2 class="menu-label mb-3">Resumen de actividad</h2>
    <div class="row g-3">
        
        <!-- Usuarios -->
        <div class="col-6 col-xl-3">
            <a onclick="mostrarvistaUsuarioAdmin()" class="text-decoration-none text-dark">
                <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                    <div class="d-flex align-items-center gap-3">
                        <div class="p-2 rounded-3 bg-primary-soft">
                            <i class="bi bi-people text-primary fs-4"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0" id="adminUsuariosCount">0</h5>
                            <small class="text-muted">Usuarios</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Cursos -->
        <div class="col-6 col-xl-3">
            <a class="text-decoration-none text-dark" onclick="mostrarvistaCursosAdmin()">
                <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                    <div class="d-flex align-items-center gap-3">
                        <div class="p-2 rounded-3" style="background-color: #f0fdf4;">
                            <i class="bi bi-journal-text fs-4" style="color: #16a34a;"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0" id="adminCursosCount">0</h5>
                            <small class="text-muted">Cursos</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Módulos -->
        <div class="col-6 col-xl-3">
            <a onclick="mostrarvistaModulosAdmin()" class="text-decoration-none text-dark">
                <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                    <div class="d-flex align-items-center gap-3">
                        <div class="p-2 rounded-3" style="background-color: #faf5ff;">
                            <i class="bi bi-layers fs-4" style="color: #9333ea;"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0" id="adminModulosCount">0</h5>
                            <small class="text-muted">Módulos</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Asistencia -->
        <div class="col-6 col-xl-3">
            <a onclick="mostrarvistaAsistenciaAdmin()" class="text-decoration-none text-dark">
                <div class="card-stat bg-white p-4 rounded-4 border-0 shadow-sm">
                    <div class="d-flex align-items-center gap-3">
                        <div class="p-2 rounded-3" style="background-color: #fff7ed;">
                            <i class="bi bi-calendar-check fs-4" style="color: #ea580c;"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-0" id="adminAsistenciaPercent">0%</h5>
                            <small class="text-muted" id="adminAsistenciaText">Asistencia</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

    </div>
</div>
