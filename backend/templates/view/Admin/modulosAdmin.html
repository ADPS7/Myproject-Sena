<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold h4 mb-0">Gestión de Módulos</h2>
    
    <button type="button" class="btn btn-primary rounded-3 shadow-sm d-flex align-items-center gap-2" 
            data-bs-toggle="modal" data-bs-target="#modalAgregarModulo">
        <i class="bi bi-plus-circle-fill"></i>
        <span>Agregar Módulo</span>
    </button>
</div>

<div class="modal fade" id="modalAgregarModulo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white rounded-top-4">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-layers-fill me-2"></i> Nuevo Módulo
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formAgregarModulo">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre del Módulo</label>
                        <input type="text" id="nombre_modulo" class="form-control rounded-3" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Inicio</label>
                            <input type="date" id="fecha_inicio" class="form-control rounded-3" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Fin</label>
                            <input type="date" id="fecha_fin" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="id_curso_modulo" class="form-label small fw-bold">Seleccionar Curso</label>
                        <select id="id_curso_modulo" class="form-select rounded-3 shadow-sm" required>
                            <option value="" selected disabled>Cargando cursos...</option>
                            </select>
                        <div class="form-text text-muted small">
                            El sistema guardará el ID del curso seleccionado.
                        </div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary py-2 rounded-3 fw-bold">
                            Guardar Módulo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm rounded-4 mt-4">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Módulo</th>
                        <th>Curso Asignado</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th class="text-end pe-4">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-modulos-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{{url_for('static', filename='backend/javascripts/modulosAdmin.js')}}"></script>
