<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Módulos - Edullinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container-fluid px-2 px-md-4 py-4">
    
    <div class="row g-3 align-items-center mb-4">
        <div class="col-12 col-lg-4">
            <h2 class="fw-bold h4 mb-0 text-center text-lg-start">
                <i class="bi bi-box-seam-fill text-primary me-2"></i>Gestión de Módulos
            </h2>
        </div>
        
        <div class="col-12 col-lg-8">
            <div class="d-flex flex-column flex-sm-row gap-3 justify-content-lg-end">
                <div class="input-group shadow-sm flex-grow-1" style="max-width: 400px;">
                    <span class="input-group-text bg-white border-end-0 rounded-start-3">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="inputBusqueda" class="form-control border-start-0 rounded-end-3" 
                           placeholder="Buscar por módulo o curso...">
                </div>

                <button type="button" class="btn btn-primary rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2 px-4" 
                        data-bs-toggle="modal" data-bs-target="#modalAgregarModulo">
                    <i class="bi bi-plus-circle-fill"></i>
                    <span class="text-nowrap">Nuevo Módulo</span>
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3">Módulo</th>
                            <th>Curso Asignado</th>
                            <th>Fecha Inicio</th>
                            <th>Fecha Fin</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-modulos-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAgregarModulo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white rounded-top-4">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-layers-fill me-2"></i> Nuevo Módulo
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formAgregarModulo">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre del Módulo</label>
                        <input type="text" id="nombre_modulo" class="form-control rounded-3" placeholder="Ej: Introducción a Flutter" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Inicio</label>
                            <input type="date" id="fecha_inicio" class="form-control rounded-3" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Fin</label>
                            <input type="date" id="fecha_fin" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="id_curso_modulo" class="form-label small fw-bold">Seleccionar Curso</label>
                        <select id="id_curso_modulo" class="form-select rounded-3 shadow-sm" required>
                            <option value="" selected disabled>Cargando cursos...</option>
                        </select>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary py-2 rounded-3 fw-bold shadow-sm">
                            Guardar Módulo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditarModulo" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-warning text-dark rounded-top-4">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-pencil-square me-2"></i> Editar Módulo
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formEditarModulo">
                    <input type="hidden" id="edit_id_modulo">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre del Módulo</label>
                        <input type="text" id="edit_nombre_modulo" class="form-control rounded-3" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Inicio</label>
                            <input type="date" id="edit_fecha_inicio" class="form-control rounded-3" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label small fw-bold">Fecha Fin</label>
                            <input type="date" id="edit_fecha_fin" class="form-control rounded-3" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Curso Asignado</label>
                        <select id="edit_id_curso_modulo" class="form-select rounded-3 shadow-sm" required>
                            </select>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-warning py-2 rounded-3 fw-bold shadow-sm">
                            Actualizar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!--modal eliminar datos-->
<div class="modal fade" id="modalConfirmarEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i> ¿Eliminar Módulo?</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 text-center">
                ¿Estás seguro de que deseas eliminar este módulo? Esta acción no se puede deshacer.
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btnConfirmarEliminarModulo" class="btn btn-danger px-4">Sí, eliminar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{url_for('static', filename='backend/javascripts/modulosAdmin.js')}}"></script>

</body>
</html>
