<div class="container-fluid px-3 py-4">
    <h2 class="fw-bold h4 mb-4">Gestión de Usuarios</h2>
    <div class="row g-3">
        <!-- Tarjeta: Coordinadores -->
        <div class="col-12 col-md-4">
            <div class="card bg-white p-4 rounded-4 border-0 shadow-sm h-100">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-info-subtle text-info rounded-3 p-2 me-3">
                        <i class="bi bi-person-badge-fill fs-3"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Coordinadores</h5>
                        <p class="text-muted small mb-0">Gestión de programa</p>
                    </div>
                </div>
                <hr class="opacity-25">
                <button type="button" class="btn btn-outline-info w-100 rounded-3 d-flex align-items-center justify-content-center gap-2" 
                        data-bs-toggle="modal" data-bs-target="#modalCoordinadores">
                    <i class="bi bi-eye-fill"></i> Ver coordinadores
                </button>
            </div>
        </div>

        <!-- Tarjeta: Profesores -->
        <div class="col-12 col-md-4">
            <div class="card bg-white p-4 rounded-4 border-0 shadow-sm h-100">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-primary-subtle text-primary rounded-3 p-2 me-3">
                        <i class="bi bi-person-workspace fs-3"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Profesores</h5>
                        <p class="text-muted small mb-0">Gestión académica</p>
                    </div>
                </div>
                <hr class="opacity-25">
                <button type="button" class="btn btn-outline-primary w-100 rounded-3 d-flex align-items-center justify-content-center gap-2" 
                        data-bs-toggle="modal" data-bs-target="#modalProfesores">
                    <i class="bi bi-eye-fill"></i> Ver profesores
                </button>
            </div>
        </div>

        <!-- Tarjeta: Estudiantes -->
        <div class="col-12 col-md-4">
            <div class="card bg-white p-4 rounded-4 border-0 shadow-sm h-100">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-success-subtle text-success rounded-3 p-2 me-3">
                        <i class="bi bi-mortarboard-fill fs-3"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Estudiantes</h5>
                        <p class="text-muted small mb-0">Estudiante</p>
                    </div>
                </div>
                <hr class="opacity-25">
                <button type="button" class="btn btn-outline-success w-100 rounded-3 d-flex align-items-center justify-content-center gap-2" 
                        data-bs-toggle="modal" data-bs-target="#modalEstudiantes">
                    <i class="bi bi-eye-fill"></i> Ver estudiantes
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Coordinadores -->
<div class="modal fade" id="modalCoordinadores" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-info text-dark rounded-top-4 flex-column align-items-stretch">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h5 class="modal-title fw-bold">Coordinadores</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="input-group input-group-sm mt-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscarCoordinadorModal" class="form-control border-start-0 rounded-end-3" placeholder="Buscar coordinador...">
                </div>
            </div>
            <div class="modal-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light small">
                            <tr>
                                <th class="ps-4">NOMBRE</th>
                                <th>CORREO</th>
                                <th class="text-end pe-4">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-coordinadores-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Profesores -->
<div class="modal fade" id="modalProfesores" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-primary text-white rounded-top-4 flex-column align-items-stretch">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h5 class="modal-title fw-bold">Profesores</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="input-group input-group-sm mt-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 rounded-start-3"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscarProfesorModal" class="form-control border-start-0 rounded-end-3" placeholder="Buscar profesor...">
                </div>
            </div>
            <div class="modal-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light small">
                            <tr>
                                <th class="ps-4">NOMBRE</th>
                                <th>CORREO</th>
                                <th class="text-end pe-4">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-profesores-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Estudiantes -->
<div class="modal fade" id="modalEstudiantes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-success text-white rounded-top-4 flex-column align-items-stretch">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <h5 class="modal-title fw-bold">Estudiantes</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="input-group input-group-sm mt-3 shadow-sm">
                    <span class="input-group-text bg-white border-end-0 rounded-start-3">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="buscarEstudianteModal" class="form-control border-start-0 rounded-end-3" placeholder="Buscar estudiante...">
                </div>
            </div>
            <div class="modal-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light small">
                            <tr>
                                <th class="ps-4">NOMBRE</th>
                                <th>CORREO</th>
                                <th class="text-end pe-4">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-estudiantes-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Editar Usuario -->
<div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-dark text-white rounded-top-4">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Editar Usuario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formEditarUsuario">
                <div class="modal-body p-4">
                    <input type="hidden" id="edit_user_id">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">NOMBRES</label>
                            <input type="text" id="edit_nombres" class="form-control rounded-3 shadow-sm" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">APELLIDOS</label>
                            <input type="text" id="edit_apellidos" class="form-control rounded-3 shadow-sm" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">CORREO ELECTRÓNICO</label>
                        <input type="email" id="edit_correo" class="form-control rounded-3 shadow-sm" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">FECHA DE NACIMIENTO</label>
                            <input type="date" id="edit_fecha_nacimiento" class="form-control rounded-3 shadow-sm" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">ROL</label>
                            <select id="edit_rol" class="form-select rounded-3 shadow-sm" required>
                                <option value="2">Estudiante</option>
                                <option value="3">Profesor</option>
                                <option value="4">Coordinador</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-3 border" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-dark rounded-3 px-4 shadow">Actualizar Datos</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Eliminar Usuario -->
<div class="modal fade" id="modalConfirmarEliminarUsuario" tabindex="-1" aria-hidden="true" style="z-index: 1070;">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <div class="text-danger mb-3">
                    <i class="bi bi-exclamation-circle-fill fs-1"></i>
                </div>
                <h5 class="fw-bold">¿Estás seguro?</h5>
                <p class="text-muted small">Esta acción no se puede deshacer. Se eliminará a:</p>
                <p class="fw-bold mb-4" id="nombreUsuarioEliminar"></p>
                
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light border rounded-3 w-100" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnConfirmarEliminar" class="btn btn-danger rounded-3 w-100 shadow-sm">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
